log4j.rootLogger=INFO, FileAppender
#log4j.rootLogger=INFO, ConsoleAppender, FileAppender

log4j.logger.org.apache.commons.httpclient.HttpClient=DEBUG, FileAppender, ConsoleAppender
log4j.additivity.org.apache.commons.httpclient.HttpClient=false

log4j.logger.de.creditreform.crefoteam.cte.rest=DEBUG, FileAppender, ConsoleAppender
log4j.additivity.de.creditreform.crefoteam.cte.rest=false

log4j.logger.de.creditreform.crefoteam.cte.tesun=INFO, FileAppender, ConsoleAppender
log4j.additivity.de.creditreform.crefoteam.cte.tesun=false

log4j.logger.cte.testfaelle=INFO, FileAppender, ConsoleAppender
log4j.additivity.cte.testfaelle=false

#Console Appender
log4j.appender.ConsoleAppender=org.apache.log4j.ConsoleAppender
log4j.appender.ConsoleAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.ConsoleAppender.layout.ConversionPattern=[%d{dd.MM.yyyy HH:mm:ss.SSS}] %m%n
log4j.appender.ConsoleAppender.Threshold=INFO

#File Appender
log4j.appender.FileAppender=org.apache.log4j.RollingFileAppender
log4j.appender.FileAppender.file=./TesunFactory.log
log4j.appender.FileAppender.MaxFileSize=10240KB
log4j.appender.FileAppender.MaxBackupIndex=10
log4j.appender.FileAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.FileAppender.layout.ConversionPattern=[%d{dd.MM.yyyy HH:mm:ss.SSS}]::> %m%n
log4j.appender.FileAppender.Threshold=INFO

